server:
  port: 8080

aliyun:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    realtime-ws-url: ${DASHSCOPE_REALTIME_WS_URL:wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
    realtime-model: ${REALTIME_MODEL:qwen3.5-omni-plus-realtime}
    default-voice: ${REALTIME_VOICE:Jennifer}


spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  upload:
    max-file-size-mb: 20
    max-pdf-pages: 30

ocr:
  provider: mock
  baidu:
    api-key: 
    secret-key: 
  tencent:
    secret-id: 
    secret-key: 

assessment:
  provider: ${ASSESSMENT_PROVIDER:mock}
  mock-enabled: true
  max-audio-duration-seconds: 30
  max-audio-size-mb: 10
  vendor:
    app-id: ${ASSESSMENT_APP_ID:}
    api-key: ${ASSESSMENT_API_KEY:}
    api-secret: ${ASSESSMENT_API_SECRET:}

tts:
  voice-style: ${REALTIME_VOICE_STYLE:professional_female}
  speed-normal: 1.0
  speed-slow: 0.75
